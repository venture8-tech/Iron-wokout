function load(k,f){try{var r=localStorage.getItem(k);return r===null?f:JSON.parse(r)}catch(e){return f}}function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}}function iso(d){var x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)}function today(){return iso(new Date())}function phase(w){return PHASES.find(function(p){return w>=p.min&&w<=p.max})}function dateForWeekDay(w,index){var d=new Date(START+"T12:00:00");d.setDate(d.getDate()+((w-1)*7)+index);return iso(d)}function weekFromDate(ds){var a=new Date(START+"T12:00:00"),b=new Date(ds+"T12:00:00");return Math.max(1,Math.min(12,Math.floor((b-a)/604800000)+1))}function setCount(w,base){if(w<=2)return Math.max(2,base-1);if(w===8)return Math.max(2,base-1);if(w>=9&&base===3)return 4;return base}function ex(id,name,sets,target,tip,kind){return{id:id,name:name,sets:sets,target:target,tip:tip,kind:kind||"strength"}}function cardioTarget(w,type){if(type==="walk"){if(w<=2)return"20 min easy";if(w<=4)return"25 min steady";if(w<=7)return"30 min steady";if(w===8)return"20 min easy";if(w<=11)return"30-35 min";return"30 min benchmark"}if(type==="bike"){if(w<=2)return"15 min easy";if(w<=4)return"18-20 min";if(w<=7)return"22-25 min";if(w===8)return"15 min easy";if(w<=11)return"25-30 min";return"25 min benchmark"}return"20-30 min"}

function entry(ds){ds=ds||state.selected;var p=planFor(weekFromDate(ds),new Date(ds+"T12:00:00").getDay()),e=state.workout[ds];if(e)return e;var q={};p.items.forEach(function(x){q[x.id]=0});return{progress:q,completed:false,startedAt:null,finishedAt:null}}function complete(e,p){return p.items.length>0&&p.items.every(function(x){return(e.progress[x.id]||0)>=x.sets})}function persist(){save(K.workout,state.workout);save(K.weight,state.weights);save(K.prefs,state.prefs);save(K.habits,state.habits);save(K.measure,state.measurements);save(K.recovery,state.recovery)}function total(){return Object.keys(state.workout).filter(function(k){return state.workout[k].completed}).length}function weekPct(){var n=0,d=0;for(var i=0;i<7;i++){var ds=dateForWeekDay(state.week,i),p=planFor(state.week,new Date(ds+"T12:00:00").getDay());if(p.items.length){d++;if(state.workout[ds]&&state.workout[ds].completed)n++}}return d?Math.round(n/d*100):0}function streak(){var s=0,d=new Date();for(var i=0;i<90;i++){var ds=iso(d);if(state.workout[ds]&&state.workout[ds].completed)s++;else if(i>0)break;d.setDate(d.getDate()-1)}return s}function latestWeight(){var ks=Object.keys(state.weights).sort().reverse();return ks.length?state.weights[ks[0]]:null}function latestBench(){var best=null;Object.keys(state.prefs.details).forEach(function(k){if(k.indexOf("|mbp")>0||k.indexOf("|fbp")>0){var d=state.prefs.details[k],w=parseFloat(d.weight),r=parseFloat(d.reps);if(!isNaN(w)&&!isNaN(r)){var est=w*(1+r/30);if(!best||est>best.est)best={weight:w,reps:r,est:est}}}});return best}function readiness(){var r=state.recovery[today()];if(!r)return{label:"Check in",detail:"Log energy and soreness",color:"var(--amber)"};var score=(+r.energy||3)+(+r.sleep||3)+(6-(+r.soreness||3));if(score>=12)return{label:"Ready",detail:"Normal training is appropriate",color:"var(--green)"};if(score>=9)return{label:"Moderate",detail:"Keep 2-3 reps in reserve",color:"var(--amber)"};return{label:"Low",detail:"Reduce load or choose recovery",col

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0a">
<title>Iron Runway Pro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23C95732'/%3E%3Ctext x='50' y='67' font-size='58' text-anchor='middle' fill='white'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0b0b0a;--surface:#151412;--surface2:#201d19;--surface3:#29241e;
  --text:#f4efe7;--muted:#92887c;--rust:#c95732;--gold:#d6a54e;
  --steel:#668891;--green:#6f9d72;--red:#d46352;--line:#2e2923;
  --shadow:0 16px 45px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.safe{padding-top:max(18px,env(safe-area-inset-top));padding-bottom:max(110px,calc(env(safe-area-inset-bottom) + 90px))}
.app{max-width:500px;margin:auto;padding-left:18px;padding-right:18px}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column;gap:12px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:800}
.logo{font-size:14px;letter-spacing:2.2px;text-transform:uppercase;color:#b2a79a}
.icon-btn{width:42px;height:42px;border-radius:13px;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:18px}
.hero{position:relative;overflow:hidden;border:1px solid var(--line);background:
radial-gradient(circle at 90% 10%,rgba(201,87,50,.20),transparent 38%),
linear-gradient(145deg,var(--surface),#0f0e0d);border-radius:18px;padding:22px;margin:20px 0 16px;box-shadow:var(--shadow)}
.hero:before{content:"";position:absolute;inset:0 auto 0 0;width:6px;background:var(--accent,var(--rust))}
.hero h1{font-size:43px;line-height:.95;margin:8px 0 10px;letter-spacing:-1.8px;text-transform:uppercase}
.hero-sub{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--accent,var(--rust))}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}
.mini-stat{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:10px}
.mini-stat b{display:block;font-size:16px}
.mini-stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.daystrip{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:var(--surface);padding:8px;border-radius:16px;border:1px solid var(--line)}
.daybtn{border:0;background:transparent;color:var(--muted);border-radius:11px;padding:8px 2px;min-width:0}
.daybtn.active{background:var(--accent,var(--rust));color:#0b0b0a;font-weight:800}
.daybtn .d{font-size:11px;font-weight:800}
.daybtn .n{font-size:10px;margin-top:5px;opacity:.8}
.daybtn.done:after{content:"✓";display:block;font-size:10px;margin-top:3px;color:var(--gold)}
.daybtn.active.done:after{color:#0b0b0a}
.navtabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0}
.tab{border:1px solid var(--line);background:var(--surface);color:var(--muted);padding:11px 6px;border-radius:13px;font-weight:800;font-size:13px}
.tab.active{background:var(--rust);border-color:var(--rust);color:white}
.sessionbar{display:flex;gap:8px;margin-bottom:14px}
.sessionbar button{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:12px;padding:11px;font-weight:800}
.sessionbar .primary{background:var(--green);border-color:var(--green);color:#0b0b0a}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
.card.complete{border-color:var(--gold);background:linear-gradient(140deg,rgba(214,165,78,.10),var(--surface))}
.exercise-title{font-size:16px;font-weight:850;line-height:1.2}
.target{color:var(--accent,var(--steel));font-weight:900;font-size:13px}
.tip{font-size:12px;color:var(--muted);margin:8px 0 13px;line-height:1.45}
.set-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.setbtn{border:1px solid transparent;background:var(--surface3);color:var(--muted);border-radius:12px;padding:11px 3px;font-weight:800;min-height:42px}
.setbtn.done{background:var(--gold);color:#12100d}
.set-detail{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.small-input{width:100%;background:#11100e;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:10px}
.note{width:100%;min-height:78px;resize:vertical;background:#11100e;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:12px}
.progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px}
.stat .v{font-size:25px;font-weight:900}
.stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.section-title{font-size:18px;font-weight:900;margin:22px 0 10px}
.bar{height:9px;background:var(--surface3);border-radius:99px;overflow:hidden}
.bar span{display:block;height:100%;background:var(--gold);border-radius:99px}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
.history-item:last-child{border-bottom:0}
.badge{display:inline-flex;align-items:center;gap:5px;background:var(--surface3);border-radius:999px;padding:6px 9px;font-size:11px;color:var(--muted)}
.action-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:14px;padding:14px;font-weight:800;text-align:left}
.action span{display:block;color:var(--muted);font-size:11px;font-weight:500;margin-top:4px}
.rest{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:50;width:min(92%,460px);background:var(--surface2);border:1px solid var(--line);border-radius:17px;padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.rest.urgent{background:var(--rust)}
.rest-time{font-size:28px;font-weight:950;min-width:76px;text-align:center}
.rest-grow{flex:1}
.rest-name{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rest.urgent .rest-name{color:#24140e}
.rest button{border:0;background:rgba(255,255,255,.08);color:inherit;border-radius:10px;padding:8px 10px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:70;display:flex;align-items:flex-end;justify-content:center}
.sheet{width:min(100%,500px);max-height:90vh;overflow:auto;background:var(--surface);border-radius:24px 24px 0 0;padding:22px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.field{margin-bottom:14px}
.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:#11100e;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:12px}
.btn{border:0;border-radius:12px;padding:13px 16px;font-weight:900}
.btn.primary{background:var(--rust);color:white;width:100%}
.btn.secondary{background:var(--surface3);color:var(--text)}
.toast{position:fixed;top:19%;left:50%;transform:translateX(-50%);z-index:90;background:var(--gold);color:#17120b;border-radius:14px;padding:13px 18px;font-weight:900;box-shadow:var(--shadow)}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:80;overflow:hidden}
.confetti i{position:absolute;top:-20px;width:8px;height:14px;background:var(--gold);animation:fall 1.8s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
.empty{text-align:center;padding:34px 18px;color:var(--muted)}
.footer-note{text-align:center;color:var(--muted);font-size:11px;margin:20px 0}
@media(max-width:360px){.hero h1{font-size:36px}.set-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const PROGRAM={
0:{label:"Full Rest",tag:"recover",sub:"Recover · Reset · Grow",exercises:[]},
1:{label:"Push Day",tag:"push",sub:"Chest · Shoulders · Triceps",exercises:[
{id:"p1",name:"DB Chest Press",sets:3,target:"8–12",tip:"Controlled lowering. Stop 1–2 reps before form breaks."},
{id:"p2",name:"Incline DB Press",sets:3,target:"8–10",tip:"Use a modest incline and keep shoulders packed."},
{id:"p3",name:"DB Shoulder Press",sets:3,target:"8–12",tip:"Brace your core and avoid overextending your back."},
{id:"p4",name:"Lateral Raises",sets:4,target:"12–15",tip:"Lead with elbows. Light weight, clean reps."},
{id:"p5",name:"Overhead Tricep Extension",sets:3,target:"10–12",tip:"Keep elbows pointed forward."},
{id:"p6",name:"Skull Crushers",sets:3,target:"10",tip:"Lower behind the forehead and keep elbows steady."}]},
2:{label:"Pull Day",tag:"pull",sub:"Back · Biceps · Rear Delts",exercises:[
{id:"u1",name:"DB Rows",sets:3,target:"8–12",tip:"Pull toward the hip, not the shoulder."},
{id:"u2",name:"Two-Arm DB Row",sets:3,target:"8–10",tip:"Hinge, brace, and squeeze the shoulder blades."},
{id:"u3",name:"Reverse Fly",sets:3,target:"12–15",tip:"Use less weight than you think."},
{id:"u4",name:"Bicep Curls",sets:3,target:"8–10",tip:"Full extension and no swinging."},
{id:"u5",name:"Hammer Curls",sets:3,target:"10–12",tip:"Keep wrists neutral and elbows pinned."}]},
3:{label:"Leg Day",tag:"legs",sub:"Quads · Glutes · Hamstrings",exercises:[
{id:"l1",name:"Goblet / Barbell Squat",sets:4,target:"8–10",tip:"Own the depth before chasing load."},
{id:"l2",name:"Romanian Deadlift",sets:3,target:"10",tip:"Push hips back and keep the weight close."},
{id:"l3",name:"Walking Lunges",sets:3,target:"12 / leg",tip:"Long step, stable knee, upright torso."},
{id:"l4",name:"Glute Bridge",sets:3,target:"15",tip:"Pause and squeeze hard at the top."},
{id:"l5",name:"Calf Raises",sets:3,target:"15",tip:"Slow negative and full stretch."}]},
4:{label:"Cardio + Core",tag:"cardio",sub:"Conditioning · Abs",exercises:[
{id:"c1",name:"Steady-State Cardio",sets:1,target:"25–30 min",tip:"Comfortably hard. You should still be able to speak."},
{id:"c2",name:"Plank Hold",sets:3,target:"45 sec",tip:"Ribs down, glutes tight, hips level."},
{id:"c3",name:"Bicycle Crunches",sets:3,target:"15 / side",tip:"Move slowly and rotate through the torso."},
{id:"c4",name:"Leg Raises",sets:3,target:"12",tip:"Keep your lower back pressed down."}]},
5:null,6:null};
PROGRAM[5]=JSON.parse(JSON.stringify(PROGRAM[1]));PROGRAM[6]=JSON.parse(JSON.stringify(PROGRAM[2]));
const COLORS={push:"var(--rust)",pull:"var(--gold)",legs:"var(--steel)",cardio:"var(--steel)",recover:"var(--muted)"};
const K={profile:"ir-profile",workout:"ir-workout-log",weight:"ir-weight-log",pro:"ir-pro-state"};
const load=function(k,f){
  try {
    var raw=window.localStorage.getItem(k);
    return raw===null ? f : JSON.parse(raw);
  } catch(err) {
    console.warn("Storage read failed:",k,err);
    return f;
  }
};
const save=function(k,v){
  try {
    window.localStorage.setItem(k,JSON.stringify(v));
    return true;
  } catch(err) {
    console.warn("Storage write failed:",k,err);
    return false;
  }
};
const iso=d=>{const x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)};
const today=()=>iso(new Date());
let state={
profile:load(K.profile,null),workout:load(K.workout,{}),weights:load(K.weight,{}),
pro:load(K.pro,{notes:{},details:{},restDefault:90,theme:"rust"}),
tab:"workout",selected:today(),rest:null,sessionStart:null,modal:null,toast:null
};
function program(){return PROGRAM[new Date(state.selected+"T12:00:00").getDay()]}
function entry(ds=state.selected){
 const p=PROGRAM[new Date(ds+"T12:00:00").getDay()],e=state.workout[ds];
 if(e)return e;
 const progress={};p.exercises.forEach(x=>progress[x.id]=0);
 return{progress,completed:false,startedAt:null,finishedAt:null};
}
function persist(){save(K.workout,state.workout);save(K.weight,state.weights);save(K.pro,state.pro)}
function week(){
 const base=new Date(state.selected+"T12:00:00"),start=new Date(base);start.setDate(base.getDate()-base.getDay());
 return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d});
}
function completed(e,p){return p.exercises.length&&p.exercises.every(x=>(e.progress[x.id]||0)>=x.sets)}
function total(){return Object.values(state.workout).filter(x=>x.completed).length}
function streak(){
 let n=0,d=new Date();
 for(let i=0;i<120;i++){
  const ds=iso(d),p=PROGRAM[d.getDay()];
  if(!p.exercises.length){d.setDate(d.getDate()-1);continue}
  if(state.workout[ds]?.completed){n++;d.setDate(d.getDate()-1)}else break
 }return n
}
function weeklyPct(){
 const dates=week(),planned=dates.filter(d=>PROGRAM[d.getDay()].exercises.length),done=planned.filter(d=>state.workout[iso(d)]?.completed);
 return Math.round(done.length/planned.length*100)||0
}
function startSession(){
 let e={...entry(),progress:{...entry().progress}};
 e.startedAt=e.startedAt||Date.now();state.workout[state.selected]=e;state.sessionStart=e.startedAt;persist();toast("Session started");
}
function finishSession(){
 const p=program(),e={...entry(),progress:{...entry().progress}};
 p.exercises.forEach(x=>e.progress[x.id]=x.sets);e.completed=true;e.finishedAt=Date.now();e.startedAt=e.startedAt||Date.now();
 state.workout[state.selected]=e;persist();state.rest=null;celebrate();render()
}
function toggleSet(id,index,name){
 const p=program(),x=p.exercises.find(v=>v.id===id),e={...entry(),progress:{...entry().progress}},cur=e.progress[id]||0;
 e.startedAt=e.startedAt||Date.now();e.progress[id]=index<cur?index:index+1;e.completed=completed(e,p);
 if(e.completed&&!entry().completed)e.finishedAt=Date.now();
 state.workout[state.selected]=e;
 if(index>=cur&&e.progress[id]<x.sets)startRest(name);
 persist();if(e.completed)celebrate();render()
}
function startRest(name){state.rest={left:state.pro.restDefault||90,name};render()}
let timer=setInterval(()=>{if(!state.rest)return;state.rest.left--;if(state.rest.left<=0){state.rest=null;toast("Rest complete");navigator.vibrate?.([120,80,120])}render()},1000);
function toast(msg){state.toast=msg;render();setTimeout(()=>{state.toast=null;render()},1400)}
function celebrate(){
 state.toast="Workout complete — nice work.";
 render();navigator.vibrate?.([100,60,100]);
 setTimeout(()=>{state.toast=null;render()},1800)
}
function esc(s=""){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function duration(e){
 if(!e.startedAt)return"—";const end=e.finishedAt||Date.now(),m=Math.max(1,Math.round((end-e.startedAt)/60000));return m+"m"
}
function render(){
 const root=document.getElementById("root");
 if(!state.profile){root.innerHTML=onboarding();bind();return}
 const p=program(),accent=COLORS[p.tag],e=entry(),doneSets=p.exercises.reduce((a,x)=>a+Math.min(e.progress[x.id]||0,x.sets),0),allSets=p.exercises.reduce((a,x)=>a+x.sets,0);
 root.innerHTML=`<main class="app safe" style="--accent:${accent}">
 <header class="row"><div class="logo">${esc(state.profile.name||"Oscar")}'s Runway</div><button class="icon-btn" data-a="settings">⚙</button></header>
 <section class="hero">
  <div class="eyebrow">${state.selected===today()?"Today":new Date(state.selected+"T12:00:00").toLocaleDateString([], {weekday:"long",month:"short",day:"numeric"})}</div>
  <h1>${esc(p.label)}</h1><div class="hero-sub">${esc(p.sub||"Recovery")}</div>
  <div class="hero-stats">
   <div class="mini-stat"><b>${doneSets}/${allSets||0}</b><span>sets</span></div>
   <div class="mini-stat"><b>${duration(e)}</b><span>time</span></div>
   <div class="mini-stat"><b>${weeklyPct()}%</b><span>week</span></div>
  </div>
 </section>
 ${dayStrip()}
 <nav class="navtabs">
  ${tab("workout","Workout")}${tab("progress","Progress")}${tab("more","More")}
 </nav>
 ${state.tab==="workout"?workoutView(p,e):state.tab==="progress"?progressView():moreView()}
 <div class="footer-note">Progress is stored privately in Safari on this device.</div>
 </main>${restBar()}${modal()}${state.toast?`<div class="toast">${esc(state.toast)}</div>`:""}${state.toast?.includes("complete")?confetti():""}`;
 bind()
}
function tab(k,l){return`<button class="tab ${state.tab===k?"active":""}" data-a="tab" data-v="${k}">${l}</button>`}
function dayStrip(){
 return`<div class="daystrip">${week().map(d=>{const ds=iso(d),sel=ds===state.selected,done=state.workout[ds]?.completed;return`<button class="daybtn ${sel?"active":""} ${done?"done":""}" data-a="date" data-v="${ds}"><div class="d">${["S","M","T","W","T","F","S"][d.getDay()]}</div><div class="n">${d.getDate()}</div></button>`}).join("")}</div>`
}
function workoutView(p,e){
 if(!p.exercises.length)return`<div class="card empty"><div style="font-size:34px">🌙</div><h3>Full rest day</h3><p>Walk, hydrate, eat well, and let the work settle in.</p></div>`;
 return`<div class="sessionbar">
 <button class="primary" data-a="start">${e.startedAt?"Session running":"Start session"}</button>
 <button data-a="finish">Finish all</button>
 </div>${p.exercises.map(x=>exercise(x,e)).join("")}
 <div class="card"><div class="section-title" style="margin-top:0">Workout note</div>
 <textarea class="note" data-note="${state.selected}" placeholder="Energy, pain, wins, adjustments…">${esc(state.pro.notes[state.selected]||"")}</textarea></div>`
}
function exercise(x,e){
 const n=e.progress[x.id]||0,complete=n>=x.sets,key=state.selected+"|"+x.id,d=state.pro.details[key]||{};
 return`<section class="card ${complete?"complete":""}">
 <div class="row" style="align-items:flex-start"><div class="exercise-title">${esc(x.name)}</div><div class="target mono">${x.sets}×${esc(x.target)}</div></div>
 <div class="tip">ⓘ ${esc(x.tip)}</div>
 <div class="set-grid">${Array.from({length:x.sets},(_,i)=>`<button class="setbtn ${i<n?"done":""}" data-a="set" data-id="${x.id}" data-i="${i}" data-name="${esc(x.name)}">${i<n?"✓":i+1}</button>`).join("")}</div>
 <div class="set-detail">
  <input class="small-input" inputmode="decimal" data-detail="${key}" data-field="weight" placeholder="Weight" value="${esc(d.weight||"")}">
  <input class="small-input" inputmode="numeric" data-detail="${key}" data-field="reps" placeholder="Last reps" value="${esc(d.reps||"")}">
 </div></section>`
}
function progressView(){
 const ws=Object.entries(state.workout).filter(([,e])=>e.completed).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,8),pct=weeklyPct();
 return`<div class="progress-grid">
 <div class="stat"><div>🔥</div><div class="v mono">${streak()}</div><div class="l">current streak</div></div>
 <div class="stat"><div>🏆</div><div class="v mono">${total()}</div><div class="l">workouts</div></div>
 <div class="stat"><div>📈</div><div class="v mono">${pct}%</div><div class="l">weekly adherence</div></div>
 <div class="stat"><div>⚖️</div><div class="v mono">${latestWeight()}</div><div class="l">latest weight</div></div>
 </div>
 <div class="section-title">This week</div><div class="card"><div class="row"><span>${pct}% complete</span><span class="badge">${week().filter(d=>state.workout[iso(d)]?.completed).length} days</span></div><div class="bar" style="margin-top:12px"><span style="width:${pct}%"></span></div></div>
 <div class="section-title">Recent workouts</div><div class="card">${ws.length?ws.map(([d,e])=>`<div class="history-item"><div><b>${new Date(d+"T12:00:00").toLocaleDateString([],{month:"short",day:"numeric"})}</b><div style="color:var(--muted);font-size:12px">${PROGRAM[e.dow??new Date(d+"T12:00:00").getDay()].label}</div></div><span class="badge">${duration(e)} · ✓</span></div>`).join(""):`<div class="empty">Complete a workout and it will appear here.</div>`}</div>
 <button class="btn primary" data-a="weight">Log weight</button>`
}
function latestWeight(){const a=Object.entries(state.weights).sort((a,b)=>b[0].localeCompare(a[0]));return a.length?a[0][1]+" lb":"—"}
function moreView(){
 return`<div class="action-list">
 <button class="action" data-a="settings">⚙ Settings<span>Rest timer and profile</span></button>
 <button class="action" data-a="weight">⚖ Log weight<span>Track bodyweight</span></button>
 <button class="action" data-a="export">⬇ Export data<span>Download a backup</span></button>
 <button class="action" data-a="import">⬆ Import data<span>Restore a backup</span></button>
 </div><div class="section-title">Quick guidance</div>
 <div class="card"><b>Progressive overload</b><p class="tip">When you reach the top of the rep range with clean form for every set, increase the load slightly next time.</p>
 <b>Recovery</b><p class="tip">Pain is not the same as effort. Stop for sharp pain, dizziness, or anything that feels wrong.</p></div>
 <input id="importFile" type="file" accept="application/json" hidden>`
}
function restBar(){if(!state.rest)return"";return`<div class="rest ${state.rest.left<=10?"urgent":""}"><div class="rest-grow"><div class="eyebrow">Rest</div><div class="rest-name">${esc(state.rest.name)}</div></div><div class="rest-time mono">${state.rest.left}s</div><button data-a="plus">+30</button><button data-a="dismiss">✕</button></div>`}
function modal(){
 if(!state.modal)return"";
 if(state.modal==="settings")return`<div class="modal" data-a="close"><div class="sheet" onclick="event.stopPropagation()"><div class="row"><h2>Settings</h2><button class="icon-btn" data-a="close">✕</button></div>
 <div class="field"><label>Name</label><input id="setName" value="${esc(state.profile.name||"")}"></div>
 <div class="field"><label>Default rest timer</label><select id="setRest"><option value="60">60 seconds</option><option value="90">90 seconds</option><option value="120">120 seconds</option><option value="180">180 seconds</option></select></div>
 <button class="btn primary" data-a="save-settings">Save settings</button></div></div>`;
 if(state.modal==="weight")return`<div class="modal" data-a="close"><div class="sheet" onclick="event.stopPropagation()"><div class="row"><h2>Log weight</h2><button class="icon-btn" data-a="close">✕</button></div>
 <div class="field"><label>Date</label><input id="wDate" type="date" value="${today()}"></div>
 <div class="field"><label>Weight (lb)</label><input id="wVal" type="number" step=".1" placeholder="e.g. 178.4"></div>
 <button class="btn primary" data-a="save-weight">Save weight</button></div></div>`;
 return""
}
function onboarding(){return`<main class="app safe" style="display:flex;min-height:100vh;align-items:center"><div style="width:100%">
 <div style="font-size:42px">⚡</div><div class="eyebrow" style="margin-top:14px">Iron Runway Pro</div><h1 style="font-size:42px;margin:8px 0">Train. Track. Repeat.</h1>
 <p style="color:var(--muted);line-height:1.6">A private, mobile-first workout tracker that lives in Safari.</p>
 <div class="field"><label>Your name</label><input id="obName" placeholder="Oscar"></div>
 <div class="field"><label>Starting weight (optional)</label><input id="obWeight" type="number" step=".1"></div>
 <button class="btn primary" id="enterRunwayButton" type="button" data-a="onboard">Enter the runway</button>
 <div id="onboardError" style="display:none;color:var(--red);font-size:13px;margin-top:12px"></div>
 </div></main>`
}
function confetti(){return`<div class="confetti">${Array.from({length:24},(_,i)=>`<i style="left:${(i*41)%100}%;animation-delay:${(i%7)*.05}s;transform:rotate(${i*27}deg)"></i>`).join("")}</div>`}
function bind(){
 document.querySelectorAll("[data-a]").forEach(el=>el.onclick=()=>{
  const a=el.dataset.a;
  if(a==="tab"){state.tab=el.dataset.v;render()}
  if(a==="date"){state.selected=el.dataset.v;render()}
  if(a==="set")toggleSet(el.dataset.id,+el.dataset.i,el.dataset.name)
  if(a==="start")startSession()
  if(a==="finish")finishSession()
  if(a==="plus"){state.rest.left+=30;render()}
  if(a==="dismiss"){state.rest=null;render()}
  if(a==="settings"){state.modal="settings";render();setTimeout(()=>document.getElementById("setRest").value=state.pro.restDefault||90)}
  if(a==="weight"){state.modal="weight";render()}
  if(a==="close"){state.modal=null;render()}
  if(a==="save-settings"){state.profile.name=document.getElementById("setName").value.trim()||state.profile.name;state.pro.restDefault=+document.getElementById("setRest").value;save(K.profile,state.profile);persist();state.modal=null;toast("Settings saved")}
  if(a==="save-weight"){const d=document.getElementById("wDate").value,v=parseFloat(document.getElementById("wVal").value);if(d&&!isNaN(v)){state.weights[d]=v;persist();state.modal=null;toast("Weight logged")}}
  if(a==="onboard"){
    var nameInput=document.getElementById("obName");
    var weightInput=document.getElementById("obWeight");
    var n=nameInput ? nameInput.value.trim() : "";
    if(!n){
      toast("Enter your name first");
      return;
    }
    state.profile={name:n,createdAt:today()};
    var w=weightInput ? parseFloat(weightInput.value) : NaN;
    if(!isNaN(w)) state.weights[today()]=w;
    save(K.profile,state.profile);
    persist();
    state.tab="workout";
    state.modal=null;
    render();
  }
  if(a==="export")exportData()
  if(a==="import")document.getElementById("importFile").click()
 });
 document.querySelectorAll("[data-note]").forEach(el=>el.oninput=()=>{state.pro.notes[el.dataset.note]=el.value;persist()});
 document.querySelectorAll("[data-detail]").forEach(el=>el.oninput=()=>{const k=el.dataset.detail;state.pro.details[k]=state.pro.details[k]||{};state.pro.details[k][el.dataset.field]=el.value;persist()});
 const f=document.getElementById("importFile");if(f)f.onchange=importData;

 var enterButton=document.getElementById("enterRunwayButton");
 if(enterButton && !enterButton.dataset.directBound){
   enterButton.dataset.directBound="1";
   enterButton.addEventListener("touchend",function(ev){
     ev.preventDefault();
     var nameInput=document.getElementById("obName");
     var weightInput=document.getElementById("obWeight");
     var n=nameInput ? nameInput.value.trim() : "";
     if(!n){
       var err=document.getElementById("onboardError");
       if(err){err.textContent="Please enter your name.";err.style.display="block";}
       return;
     }
     state.profile={name:n,createdAt:today()};
     var w=weightInput ? parseFloat(weightInput.value) : NaN;
     if(!isNaN(w)) state.weights[today()]=w;
     save(K.profile,state.profile);
     persist();
     state.tab="workout";
     render();
   },{passive:false});
 }
}
function exportData(){
 const blob=new Blob([JSON.stringify({version:2,profile:state.profile,workout:state.workout,weights:state.weights,pro:state.pro},null,2)],{type:"application/json"});
 const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="iron-runway-backup-"+today()+".json";a.click();URL.revokeObjectURL(a.href);toast("Backup exported")
}
function importData(ev){
 const file=ev.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);state.profile=x.profile||state.profile;state.workout=x.workout||{};state.weights=x.weights||{};state.pro=x.pro||state.pro;save(K.profile,state.profile);persist();toast("Backup restored")}catch{toast("Could not import file")}};r.readAsText(file)
}
window.addEventListener("error",function(event){
  console.error(event.error||event.message);
  var errorBox=document.getElementById("onboardError");
  if(errorBox){
    errorBox.textContent="The app hit an error. Reload once, then try again.";
    errorBox.style.display="block";
  }
});
render();
</script>
</body>
</html>
